# =============================================================================
# pg_hba.conf — samba-db
# =============================================================================

# Conexões locais (unix socket) — sem senha (processo interno do container)
local   all   all                           trust

# Loopback — sem senha (mesmo host)
host    all   all   127.0.0.1/32            trust
host    all   all   ::1/128                 trust

# Replicação local
local   replication   all                   trust
host    replication   all   127.0.0.1/32    trust
host    replication   all   ::1/128         trust

# Rede Docker interna — autenticação com senha obrigatória
# Os containers se comunicam via rede interna (172.x.x.x / 10.x.x.x)
host    all   all   172.16.0.0/12           scram-sha-256
host    all   all   10.0.0.0/8              scram-sha-256
host    all   all   192.168.0.0/16          scram-sha-256
