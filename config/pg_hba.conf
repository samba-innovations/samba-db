# =============================================================================
# pg_hba.conf — samba-db (desenvolvimento)
# =============================================================================
# Em produção, restringir os IPs e usar scram-sha-256.
# Em dev, md5 aceita conexões de qualquer IP (Docker host, WSL, etc.)

# Conexões locais (unix socket) — sem senha
local   all   all                           trust

# Loopback — sem senha
host    all   all   127.0.0.1/32            trust
host    all   all   ::1/128                 trust

# Replicação local
local   replication   all                   trust
host    replication   all   127.0.0.1/32    trust
host    replication   all   ::1/128         trust

# Todas as conexões TCP locais (host Docker, WSL) — trust para dev
# Em produção: substituir por scram-sha-256 e restringir o CIDR
host    all   all   0.0.0.0/0               trust
